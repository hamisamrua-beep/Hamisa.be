<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hamisa · film reviews</title>
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&family=Comfortaa:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reviews.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">hamisa</a>
            <div class="nav-links">
                <a href="reviews.html" class="nav-link active">reviews</a>
                <a href="thoughts.html" class="nav-link">thoughts</a>
                <button class="nav-link admin-btn" id="openAdminBtn">⚙️</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="reviews-main">
        <div class="container">
            <header class="page-header">
                <h1>film reviews</h1>
                <p class="page-subtitle">thoughts on 110 films and counting</p>
            </header>

            <!-- Search and Filter -->
            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 search by title or director...">
                <select id="yearFilter" class="filter-select">
                    <option value="all">all years</option>
                </select>
            </div>

            <!-- Reviews Grid -->
            <div class="reviews-grid" id="reviewsGrid">
                <!-- Reviews loaded by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Admin Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="modal-flourish">🔐</span>
            <h2>admin access</h2>
            <input type="password" id="adminPassword" class="modal-input" placeholder="password">
            <div class="modal-actions">
                <button class="modal-btn" id="adminLoginBtn">enter</button>
                <button class="modal-btn" id="adminCancelBtn">cancel</button>
            </div>
            <div id="loginError" class="modal-error"></div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/reviews.js"></script>
</body>
</html>
